<script>
  (function () {
    const registerDownloadClickMetrics = (selector, downloadType) => {
      document.querySelectorAll(selector).forEach((link) => {
        link.addEventListener('click', () => {
          if (typeof window.gtag !== 'function') return;

          const section = link.closest('.hero-actions')
            ? 'hero'
            : link.closest('.cta-btns')
              ? 'cta'
              : 'other';

          window.gtag('event', 'download_button_click', {
            download_type: downloadType,
            section: section,
            link_url: link.href
          });
        });
      });
    };

    const versionBadge = document.querySelector('.hero-badge');
    if (!versionBadge) return;

    const versionMatch = versionBadge.textContent.match(/v?(\d+\.\d+(?:\.\d+)?)/i);
    if (!versionMatch) return;

    const version = versionMatch[1];
    const assetName = 'anima-pipeline_v' + version + '_minimal.zip';
    const releaseUrl = 'https://github.com/tomotto1296/anima-pipeline/releases/download/v' + version + '/' + assetName;

    document.querySelectorAll('.js-version-zip-download').forEach((link) => {
      link.href = releaseUrl;
      link.setAttribute('download', assetName);
    });

    registerDownloadClickMetrics('.js-github-download', 'github_release_page');
    registerDownloadClickMetrics('.js-version-zip-download', 'version_zip');
  })();
</script>
